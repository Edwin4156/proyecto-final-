<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    :root {
      --bg: #f8f9fa;
      --bg2: #ffffff;
      --bg3: #f1f3f5;
      --bg4: #e9ecef;
      --text: #1a1a2e;
      --text2: #6c757d;
      --text3: #adb5bd;
      --bdr: #dee2e6;
      --bdr2: #ced4da;
      --green: #1D9E75;
      --greenl: #d4edda;
      --greend: #085041;
      --blue: #378ADD;
      --bluel: #cfe2ff;
      --blued: #042C53;
      --amber: #BA7517;
      --amberl: #fff3cd;
      --amberd: #412402;
      --red: #E24B4A;
      --redl: #f8d7da;
      --redd: #501313;
      --purple: #534AB7;
      --purplel: #e8e6ff;
      --purpled: #26215C;
      --nx1: #1a8db8;
      --nx2: #1a3a6e;
      --radius: 10px;
      --radius-sm: 6px;
      --radius-lg: 14px;
      --font: 'Inter', sans-serif;
      --sidebar: 220px;
    }

    .dark {
      --bg: #0f1117;
      --bg2: #1a1d27;
      --bg3: #252836;
      --bg4: #2d3142;
      --text: #e8eaf6;
      --text2: #9ca3af;
      --text3: #6b7280;
      --bdr: #2d3142;
      --bdr2: #374151;
      --greenl: #064e3b;
      --bluel: #1e3a5f;
      --amberl: #451a03;
      --redl: #450a0a;
      --purplel: #2e1065;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      transition: background .2s, color .2s;
      min-height: 100vh
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden
    }

    .sidebar {
      width: var(--sidebar);
      background: var(--bg2);
      border-right: 1px solid var(--bdr);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      z-index: 50
    }

    .logo-area {
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      gap: 10px
    }

    .nexus-logo-wrap {
      display: flex;
      align-items: center;
      gap: 9px
    }

    .nexus-text-block {
      display: flex;
      flex-direction: column;
      line-height: 1
    }

    .nexus-name {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: .5px;
      background: linear-gradient(90deg, var(--nx1), var(--nx2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text
    }

    .nexus-sub {
      font-size: 9px;
      color: var(--text2);
      margin-top: 1px;
      letter-spacing: .3px
    }

    .ver-badge {
      font-size: 9px;
      background: var(--purple);
      color: #fff;
      padding: 1px 5px;
      border-radius: 3px;
      margin-left: 5px;
      vertical-align: middle;
      font-weight: 600
    }

    .user-section {
      padding: 10px 12px;
      border-bottom: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      gap: 8px
    }

    .av {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 600;
      flex-shrink: 0
    }

    .av-admin {
      background: var(--purplel);
      color: var(--purpled)
    }

    .av-vendor {
      background: var(--greenl);
      color: var(--greend)
    }

    .uinfo {
      flex: 1;
      min-width: 0
    }

    .uname {
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .urole {
      font-size: 10px;
      color: var(--text2)
    }

    .btn-logout {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text2);
      padding: 4px;
      border-radius: 5px;
      transition: all .15s
    }

    .btn-logout:hover {
      color: var(--red);
      background: var(--redl)
    }

    .nav-area {
      flex: 1;
      overflow-y: auto;
      padding: 8px
    }

    .nav-section-title {
      font-size: 9px;
      font-weight: 600;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .8px;
      padding: 8px 8px 4px
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      color: var(--text2);
      transition: all .12s;
      margin-bottom: 1px;
      white-space: nowrap
    }

    .nav-item:hover {
      background: var(--bg3);
      color: var(--text)
    }

    .nav-item.active {
      background: linear-gradient(90deg, rgba(26, 141, 184, .15), rgba(26, 58, 110, .1));
      color: var(--nx1);
      font-weight: 500;
      border-left: 2px solid var(--nx1)
    }

    .nav-item.disabled {
      opacity: .3;
      cursor: not-allowed;
      pointer-events: none
    }

    .nav-item svg {
      width: 14px;
      height: 14px;
      flex-shrink: 0
    }

    .lock-icon {
      width: 10px;
      height: 10px;
      margin-left: auto;
      opacity: .4
    }

    .nav-badge {
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 600;
      padding: 1px 5px;
      border-radius: 10px;
      margin-left: auto
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0
    }

    .topbar {
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--bdr);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--bg2);
      flex-shrink: 0
    }

    .topbar h2 {
      font-size: 15px;
      font-weight: 600
    }

    .topbar-right {
      display: flex;
      gap: 8px;
      align-items: center
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      background: var(--bg)
    }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--bdr2);
      background: var(--bg2);
      color: var(--text);
      font-family: var(--font);
      transition: all .12s
    }

    .btn:hover {
      background: var(--bg3)
    }

    .btn:active {
      transform: scale(.98)
    }

    .btn-green {
      background: var(--green);
      color: #fff;
      border-color: var(--green)
    }

    .btn-green:hover {
      background: var(--greend)
    }

    .btn-nx {
      background: linear-gradient(90deg, var(--nx1), var(--nx2));
      color: #fff;
      border: none
    }

    .btn-nx:hover {
      opacity: .9
    }

    .btn-blue {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue)
    }

    .btn-red {
      background: var(--redl);
      color: var(--redd);
      border-color: var(--red)
    }

    .btn-red:hover {
      background: var(--red);
      color: #fff
    }

    .btn-amber {
      background: var(--amberl);
      color: var(--amberd);
      border-color: var(--amber)
    }

    .btn-purple {
      background: var(--purplel);
      color: var(--purpled);
      border-color: var(--purple)
    }

    /* EXPORT BUTTONS */
    .btn-pdf {
      background: #e74c3c;
      color: #fff;
      border-color: #c0392b
    }

    .btn-pdf:hover {
      background: #c0392b
    }

    .btn-excel {
      background: #1a7a3a;
      color: #fff;
      border-color: #155e2e
    }

    .btn-excel:hover {
      background: #155e2e
    }

    .btn-csv {
      background: #f39c12;
      color: #fff;
      border-color: #e67e22
    }

    .btn-csv:hover {
      background: #e67e22
    }

    .btn-sm {
      padding: 4px 8px;
      font-size: 11px
    }

    .btn-icon {
      padding: 6px;
      border-radius: var(--radius-sm);
      background: none;
      border: 1px solid transparent;
      cursor: pointer;
      color: var(--text2);
      transition: all .12s;
      display: flex;
      align-items: center
    }

    .btn-icon:hover {
      background: var(--bg3);
      border-color: var(--bdr);
      color: var(--text)
    }

    .btn-icon svg {
      width: 15px;
      height: 15px
    }

    /* EXPORT TOOLBAR */
    .export-bar {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 10px 14px;
      background: linear-gradient(90deg, rgba(26, 141, 184, .06), rgba(26, 58, 110, .04));
      border: 1px solid rgba(26, 141, 184, .2);
      border-radius: var(--radius-sm);
      margin-bottom: 14px;
      flex-wrap: wrap
    }

    .export-bar-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--nx1);
      margin-right: 4px;
      white-space: nowrap
    }

    .export-bar-sep {
      width: 1px;
      height: 20px;
      background: var(--bdr);
      margin: 0 4px
    }

    /* CARDS */
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: var(--radius);
      padding: 14px;
      transition: all .2s
    }

    .stat-card:hover {
      border-color: var(--nx1);
      transform: translateY(-1px)
    }

    .stat-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 10px
    }

    .stat-icon svg {
      width: 18px;
      height: 18px
    }

    .stat-label {
      font-size: 11px;
      color: var(--text2);
      margin-bottom: 3px
    }

    .stat-value {
      font-size: 22px;
      font-weight: 600;
      line-height: 1
    }

    .stat-sub {
      font-size: 11px;
      color: var(--text2);
      margin-top: 4px
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 12px
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px
    }

    .card-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .4px
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    th {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text2);
      padding: 8px 12px;
      border-bottom: 1px solid var(--bdr);
      text-align: left;
      background: var(--bg3);
      white-space: nowrap
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--bdr);
      vertical-align: middle
    }

    tr:last-child td {
      border-bottom: none
    }

    tbody tr:hover td {
      background: var(--bg3)
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 7px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500
    }

    .bg {
      background: var(--greenl);
      color: var(--greend)
    }

    .ba {
      background: var(--amberl);
      color: var(--amberd)
    }

    .br {
      background: var(--redl);
      color: var(--redd)
    }

    .bb {
      background: var(--bluel);
      color: var(--blued)
    }

    .bp {
      background: var(--purplel);
      color: var(--purpled)
    }

    .fg {
      margin-bottom: 10px
    }

    .fg label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text2);
      margin-bottom: 4px
    }

    .fg input,
    .fg select,
    .fg textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--bdr2);
      border-radius: var(--radius-sm);
      font-size: 12px;
      background: var(--bg2);
      color: var(--text);
      font-family: var(--font);
      outline: none
    }

    .fg input:focus,
    .fg select:focus {
      border-color: var(--nx1)
    }

    .fr {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .fr3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px
    }

    .modal-ov {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200
    }

    .modal {
      background: var(--bg2);
      border-radius: var(--radius-lg);
      padding: 22px;
      width: 480px;
      max-height: 85vh;
      overflow-y: auto;
      border: 1px solid var(--bdr);
      animation: modalIn .18s ease
    }

    @keyframes modalIn {
      from {
        transform: scale(.95);
        opacity: 0
      }

      to {
        transform: scale(1);
        opacity: 1
      }
    }

    .modal h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 16px
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--bdr)
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg3);
      border: 1px solid var(--bdr);
      border-radius: var(--radius-sm);
      padding: 7px 11px;
      flex: 1;
      max-width: 260px
    }

    .search-box input {
      border: none;
      background: transparent;
      font-size: 12px;
      color: var(--text);
      flex: 1;
      font-family: var(--font);
      outline: none
    }

    .search-box svg {
      width: 13px;
      height: 13px;
      color: var(--text3);
      flex-shrink: 0
    }

    .toast-container {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 500;
      display: flex;
      flex-direction: column;
      gap: 6px
    }

    .toast {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: toastIn .2s ease;
      max-width: 280px
    }

    @keyframes toastIn {
      from {
        transform: translateX(100%);
        opacity: 0
      }

      to {
        transform: translateX(0);
        opacity: 1
      }
    }

    .toast-success {
      border-left: 3px solid var(--green)
    }

    .toast-error {
      border-left: 3px solid var(--red)
    }

    .toast-warn {
      border-left: 3px solid var(--amber)
    }

    .toast-info {
      border-left: 3px solid var(--blue)
    }

    .alert-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      margin-bottom: 8px
    }

    .alert-r {
      background: var(--redl);
      color: var(--redd);
      border: 1px solid var(--red)
    }

    .alert-a {
      background: var(--amberl);
      color: var(--amberd);
      border: 1px solid var(--amber)
    }

    .alert-g {
      background: var(--greenl);
      color: var(--greend);
      border: 1px solid var(--green)
    }

    .sg {
      display: grid;
      gap: 10px;
      margin-bottom: 14px
    }

    .g2 {
      grid-template-columns: repeat(2, minmax(0, 1fr))
    }

    .g3 {
      grid-template-columns: repeat(3, minmax(0, 1fr))
    }

    .g4 {
      grid-template-columns: repeat(4, minmax(0, 1fr))
    }

    .chart-container {
      position: relative;
      width: 100%
    }

    .filter-pills {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 10px
    }

    .pill {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--bdr2);
      background: var(--bg2);
      color: var(--text2);
      transition: all .12s
    }

    .pill:hover {
      background: var(--bg3)
    }

    .pill.active {
      background: linear-gradient(90deg, var(--nx1), var(--nx2));
      color: #fff;
      border-color: var(--nx1)
    }

    .kardex-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--bdr);
      font-size: 12px
    }

    .kardex-icon {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0
    }

    .ki-in {
      background: var(--greenl);
      color: var(--greend)
    }

    .ki-out {
      background: var(--redl);
      color: var(--redd)
    }

    .pos-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px;
      background: var(--bg3);
      border-radius: var(--radius-sm);
      margin-bottom: 6px
    }

    .pos-item-name {
      flex: 1;
      font-weight: 500;
      font-size: 12px
    }

    .pos-qty {
      display: flex;
      align-items: center;
      gap: 4px
    }

    .pos-qty button {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      border: 1px solid var(--bdr2);
      background: var(--bg2);
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text)
    }

    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      cursor: pointer
    }

    .toggle input {
      opacity: 0;
      width: 0;
      height: 0
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--bdr2);
      border-radius: 20px;
      transition: .2s
    }

    .toggle-slider:before {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .2s
    }

    .toggle input:checked+.toggle-slider {
      background: var(--nx1)
    }

    .toggle input:checked+.toggle-slider:before {
      transform: translateX(16px)
    }

    .perm-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px
    }

    .perm-table th {
      background: var(--bg3);
      padding: 8px 12px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: var(--text2)
    }

    .perm-table td {
      padding: 8px 12px;
      border-top: 1px solid var(--bdr);
      text-align: center
    }

    .login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg)
    }

    .login-card {
      background: var(--bg2);
      border: 1px solid var(--bdr);
      border-radius: var(--radius-lg);
      padding: 36px;
      width: 340px
    }

    .login-logo {
      text-align: center;
      margin-bottom: 28px
    }

    .login-err {
      background: var(--redl);
      color: var(--redd);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none
    }

    .login-hint {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--bdr);
      font-size: 11px;
      color: var(--text2);
      line-height: 2
    }

    .ia-msg {
      padding: 10px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      line-height: 1.6;
      margin-bottom: 8px
    }

    .ia-msg.user {
      background: linear-gradient(90deg, rgba(26, 141, 184, .15), rgba(26, 58, 110, .1));
      color: var(--nx2);
      margin-left: 20px;
      text-align: right;
      border: 1px solid rgba(26, 141, 184, .2)
    }

    .ia-msg.bot {
      background: var(--bg3);
      border: 1px solid var(--bdr);
      color: var(--text)
    }

    .ia-typing {
      display: flex;
      gap: 4px;
      padding: 10px 14px
    }

    .ia-dot {
      width: 7px;
      height: 7px;
      background: var(--text2);
      border-radius: 50%;
      animation: bounce .8s infinite
    }

    .ia-dot:nth-child(2) {
      animation-delay: .15s
    }

    .ia-dot:nth-child(3) {
      animation-delay: .3s
    }

      80%,
      100% {

      }

      border-radius: var(--radius);
      padding: 16px
    }

    .ticket-paper .tr {
      display: flex;
      justify-content: space-between
    }

    .ticket-paper .sep {
      border-top: 1px dashed var(--bdr2);
      margin: 6px 0
    }

    .progress-bar {
      height: 6px;
      border-radius: 3px;
      background: var(--bg4);
      overflow: hidden;
      margin-top: 4px
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width .4s ease
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 12px
    }

    .table-wrap {
      overflow-x: auto
    }

    /* EXPORT PREVIEW MODAL */
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px
    }

    .preview-table th {
      background: #1a8db8;
      color: #fff;
      padding: 6px 10px;
      text-align: left;
      font-size: 10px
    }

    .preview-table td {
      padding: 5px 10px;
      border-bottom: 1px solid #e0e0e0
    }

    .preview-table tr:nth-child(even) td {
      background: #f5f5f5
    }

    .preview-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: 500
    }

    @media(max-width:768px) {
      :root {
        --sidebar: 56px
      }

      .nexus-text-block,
      .nav-section-title,
      .uinfo {
        display: none
      }

      .nav-item {
        justify-content: center;
        padding: 10px
      }

      .content {
        padding: 10px
      }

      .g4 {
        grid-template-columns: repeat(2, minmax(0, 1fr))
      }

      .modal {
        width: 95vw
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <div class="toast-container" id="toasts"></div>
  <div id="modal-c"></div>

  <!-- Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>

  <!-- API Service -->
  <script src="api.js"></script>

  <script>
    const USERS_KEY = 'nxs_u2', DB_KEY = 'nxs_db2', LOGS_KEY = 'nxs_l2';
    let darkMode = false, session = null, pg = 'dashboard', sq = '', filterPer = 'todo', posCart = [];
    let charts = {}, logs = [];

    let users = [], db = { productos: [], ventas: [], compras: [] };

    async function saveAll() { }
    async function loadAll() { try { db.productos = await APIService.getProductos(); db.ventas = await APIService.getVentas(); db.compras = await APIService.getCompras(); db.kardex = await APIService.getKardex(); users = await APIService.getUsuarios(); } catch (e) { console.error('Error cargando datos:', e); } renderApp(); }
    function addLog(a, d) { logs.push({ ts: new Date().toISOString(), user: session?.usuario || '—', action: a, detail: d }); }


    const can = (p, t = 'r') => session ? true : false;
    const dias = f => { const h = new Date(); h.setHours(0, 0, 0, 0); return Math.round((new Date(f + 'T00:00:00') - h) / 86400000); };
    const estCad = f => { const d = dias(f); if (d < 0) return 'Caducado'; if (d <= 14) return `${d} días`; if (d <= 60) return `${d} días`; return 'Vigente'; };
    const estCadBadge = f => { const d = dias(f); if (d < 0) return '<span class="badge br">Caducado</span>'; if (d <= 14) return `<span class="badge br">${d}d</span>`; if (d <= 60) return `<span class="badge ba">${d}d</span>`; return '<span class="badge bg">OK</span>'; };
    const alertCount = () => db.productos.filter(p => p.stock <= p.stockMin || dias(p.caducidad) <= 30).length;
    const hoy = () => new Date().toISOString().split('T')[0];
    const fmt = n => n.toFixed(2);

    function nexusLogo(w = 40, h = 25) { return `<svg width="${w}" height="${h}" viewBox="0 0 120 74" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M37 37C37 26.5 45 18 55 18C65 18 71 24 74 30C71 36 65 42 55 42C45 42 37 47.5 37 58C37 68.5 45 74 55 74C65 74 73 66 74 56" stroke="url(#ng1)" stroke-width="10" stroke-linecap="round" fill="none"/><path d="M83 37C83 26.5 91 18 101 18C111 18 119 26.5 119 37C119 47.5 111 56 101 56C91 56 83 47.5 83 37Z" stroke="url(#ng2)" stroke-width="10" fill="none"/><path d="M1 37C1 26.5 9 18 19 18C29 18 37 26.5 37 37" stroke="url(#ng3)" stroke-width="10" stroke-linecap="round" fill="none"/><defs><linearGradient id="ng1" x1="37" y1="18" x2="74" y2="74" gradientUnits="userSpaceOnUse"><stop stop-color="#1a8db8"/><stop offset="1" stop-color="#1a3a6e"/></linearGradient><linearGradient id="ng2" x1="83" y1="18" x2="119" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1a8db8"/><stop offset="1" stop-color="#1a3a6e"/></linearGradient><linearGradient id="ng3" x1="1" y1="18" x2="37" y2="56" gradientUnits="userSpaceOnUse"><stop stop-color="#1a8db8"/><stop offset="1" stop-color="#1a3a6e"/></linearGradient></defs></svg>`; }

    function showToast(msg, type = 'success') { const c = document.getElementById('toasts'); const el = document.createElement('div'); el.className = `toast toast-${type}`; el.innerHTML = msg; c.appendChild(el); setTimeout(() => { el.style.opacity = '0'; el.style.transition = 'opacity .3s'; setTimeout(() => el.remove(), 300); }, 3500); }
    function destCharts() { Object.values(charts).forEach(c => { try { c.destroy(); } catch (e) { } }); charts = {}; }
    function nav(p) { if (!can(p)) return; pg = p; sq = ''; filterPer = 'todo'; posCart = []; renderApp(); }
    function toggleDark() { darkMode = !darkMode; document.documentElement.classList.toggle('dark', darkMode); }

    // ==================== EXPORT ENGINE ====================
    function getTimestamp() { return new Date().toLocaleString('es-GT').replace(/[/:]/g, '-').replace(',', ''); }

    // --- EXCEL export ---
    function exportExcel(data, headers, sheetName, fileName) {
      if (!window.XLSX) { showToast('Cargando librería Excel...', 'info'); return; }
      const wsData = [headers, ...data];
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      // Style header row width
      ws['!cols'] = headers.map(() => ({ wch: 20 }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, sheetName);
      XLSX.writeFile(wb, `NEXUS_${fileName}_${getTimestamp()}.xlsx`);
      showToast(`✅ Excel exportado: ${fileName}.xlsx`, 'success');
      addLog('EXPORT_EXCEL', fileName);
    }

    // --- CSV export ---
    function exportCSV(data, headers, fileName) {
      const rows = [headers, ...data];
      const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
      const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a'); a.href = url; a.download = `NEXUS_${fileName}_${getTimestamp()}.csv`; a.click();
      URL.revokeObjectURL(url);
      showToast(`✅ CSV exportado: ${fileName}.csv`, 'success');
      addLog('EXPORT_CSV', fileName);
    }

    // --- PDF export ---
    function exportPDF(data, headers, title, fileName, subtitle = '') {
      if (!window.jspdf) { showToast('Cargando librería PDF...', 'info'); return; }
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: data[0]?.length > 7 ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();

      // Header brand
      doc.setFillColor(26, 141, 184);
      doc.rect(0, 0, pageW, 18, 'F');
      doc.setFillColor(26, 58, 110);
      doc.rect(0, 14, pageW, 4, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(14); doc.setFont('helvetica', 'bold');
      doc.text('NEXUS FARMACIA', 14, 11);
      doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.text('Sistema de Gestión · Guatemala', 14, 22);
      doc.text(`Generado: ${new Date().toLocaleString('es-GT')}`, pageW - 14, 22, { align: 'right' });

      // Title
      doc.setTextColor(26, 58, 110);
      doc.setFontSize(13); doc.setFont('helvetica', 'bold');
      doc.text(title, 14, 32);
      if (subtitle) { doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.setTextColor(100, 100, 100); doc.text(subtitle, 14, 38); }

      // Table
      doc.autoTable({
        head: [headers],
        body: data,
        startY: subtitle ? 42 : 36,
        styles: { fontSize: 8, cellPadding: 3, overflow: 'linebreak' },
        headStyles: { fillColor: [26, 141, 184], textColor: 255, fontStyle: 'bold', fontSize: 8 },
        alternateRowStyles: { fillColor: [245, 250, 255] },
        columnStyles: {},
        margin: { left: 14, right: 14 },
        didDrawPage: (d) => {
          // Footer
          const pageCount = doc.internal.getNumberOfPages();
          doc.setFontSize(7); doc.setTextColor(150);
          doc.text(`Página ${d.pageNumber} de ${pageCount} · NEXUS Farmacia · Confidencial`, pageW / 2, doc.internal.pageSize.getHeight() - 5, { align: 'center' });
        }
      });

      doc.save(`NEXUS_${fileName}_${getTimestamp()}.pdf`);
      showToast(`✅ PDF exportado: ${fileName}.pdf`, 'success');
      addLog('EXPORT_PDF', fileName);
    }

    // --- Specific exporters ---
    function exportVentasPDF() {
      const src = session.rol === 'vendedor' ? db.ventas.filter(v => (v.usuario || '') === session.usuario) : db.ventas;
      const lista = [...filterByPer(src, 'fecha')].sort((a, b) => b.id - a.id);
      const tv = lista.reduce((s, v) => s + v.total, 0);
      const headers = ['#', 'Fecha', 'Producto', 'Cliente', 'NIT', 'Cant.', 'Precio', 'Dto%', 'Total', 'Pago', 'Usuario'];
      const data = lista.map(v => { const prod = v.producto || v.productoNombre || ''; const usr = users.find(u => u.id === v.usuarioId)?.usuario || v.usuario || ''; return [`#${String(v.id).padStart(4, '0')}`, v.fecha, prod, v.cliente, v.nit || 'CF', v.cantidad, `Q${fmt(v.precio)}`, v.descuento || 0, `Q${fmt(v.total)}`, v.metodoPago || 'efectivo', usr]; });
      exportPDF(data, headers, 'Reporte de Ventas', 'Ventas', `Total registros: ${lista.length} · Total vendido: Q${fmt(tv)}`);
    }
    function exportVentasExcel() {
      const src = session.rol === 'vendedor' ? db.ventas.filter(v => (v.usuario || '') === session.usuario) : db.ventas;
      const lista = [...filterByPer(src, 'fecha')].sort((a, b) => b.id - a.id);
      const headers = ['No.', 'Fecha', 'Producto', 'Cliente', 'NIT', 'Cantidad', 'Precio Unit.', 'Descuento%', 'Total', 'Método Pago', 'Usuario'];
      const data = lista.map(v => { const prod = v.producto || v.productoNombre || ''; const usr = users.find(u => u.id === v.usuarioId)?.usuario || v.usuario || ''; return [`#${String(v.id).padStart(4, '0')}`, v.fecha, prod, v.cliente, v.nit || 'CF', v.cantidad, v.precio, v.descuento || 0, v.total, v.metodoPago || 'efectivo', usr]; });
      exportExcel(data, headers, 'Ventas', 'Ventas');
    }
    function exportVentasCSV() {
      const src = session.rol === 'vendedor' ? db.ventas.filter(v => (v.usuario || '') === session.usuario) : db.ventas;
      const lista = [...filterByPer(src, 'fecha')].sort((a, b) => b.id - a.id);
      const headers = ['No.', 'Fecha', 'Producto', 'Cliente', 'NIT', 'Cantidad', 'Precio Unit.', 'Descuento%', 'Total', 'Método Pago', 'Usuario'];
      const data = lista.map(v => { const prod = v.producto || v.productoNombre || ''; const usr = users.find(u => u.id === v.usuarioId)?.usuario || v.usuario || ''; return [`#${String(v.id).padStart(4, '0')}`, v.fecha, prod, v.cliente, v.nit || 'CF', v.cantidad, v.precio, v.descuento || 0, v.total, v.metodoPago || 'efectivo', usr]; });
      exportCSV(data, headers, 'Ventas');
    }
    function exportVentasPDFUser(usuarioId, usuarioNombre) {
      const lista = db.ventas.filter(v => v.usuarioId === usuarioId).sort((a, b) => b.id - a.id);
      const tv = lista.reduce((s, v) => s + v.total, 0);
      const headers = ['#', 'Fecha', 'Producto', 'Cliente', 'NIT', 'Cant.', 'Precio', 'Dto%', 'Total', 'Pago'];
      const data = lista.map(v => { const prod = v.producto || v.productoNombre || ''; return [`#${String(v.id).padStart(4, '0')}`, v.fecha, prod, v.cliente, v.nit || 'CF', v.cantidad, `Q${fmt(v.precio)}`, v.descuento || 0, `Q${fmt(v.total)}`, v.metodoPago || 'efectivo']; });
      exportPDF(data, headers, `Ventas - ${usuarioNombre}`, `Ventas ${usuarioNombre}`, `Total registros: ${lista.length} · Total vendido: Q${fmt(tv)}`);
    }
    function exportVentasExcelUser(usuarioId, usuarioNombre) {
      const lista = db.ventas.filter(v => v.usuarioId === usuarioId).sort((a, b) => b.id - a.id);
      const headers = ['No.', 'Fecha', 'Producto', 'Cliente', 'NIT', 'Cantidad', 'Precio Unit.', 'Descuento%', 'Total', 'Método Pago'];
      const data = lista.map(v => { const prod = v.producto || v.productoNombre || ''; return [`#${String(v.id).padStart(4, '0')}`, v.fecha, prod, v.cliente, v.nit || 'CF', v.cantidad, v.precio, v.descuento || 0, v.total, v.metodoPago || 'efectivo']; });
      exportExcel(data, headers, usuarioNombre, `Ventas ${usuarioNombre}`);
    }

    function exportInventarioPDF() {
      const vc = db.productos.reduce((s, p) => s + p.stock * p.costo, 0);
      const headers = ['Producto', 'Categoría', 'Stock', 'Mínimo', 'Precio', 'Costo', 'Valor Total', 'Lote', 'Proveedor', 'Ingreso', 'Caducidad', 'Estado'];
      const data = db.productos.map(p => [p.nombre, p.categoria, p.stock, p.stockMin, `Q${fmt(p.precio)}`, `Q${fmt(p.costo)}`, `Q${fmt(p.stock * p.costo)}`, p.lote, p.proveedor || '—', p.ingreso, p.caducidad, estCad(p.caducidad)]);
      exportPDF(data, headers, 'Reporte de Inventario', 'Inventario', `Total productos: ${db.productos.length} · Valor en inventario: Q${fmt(vc)}`);
    }
    function exportInventarioExcel() {
      const headers = ['Producto', 'Categoría', 'Stock Actual', 'Stock Mínimo', 'Precio Venta', 'Costo', 'Valor Total', 'Lote', 'Proveedor', 'Fecha Ingreso', 'Fecha Caducidad', 'Estado Caducidad', 'Código Barras'];
      const data = db.productos.map(p => [p.nombre, p.categoria, p.stock, p.stockMin, p.precio, p.costo, p.stock * p.costo, p.lote, p.proveedor || '', p.ingreso, p.caducidad, estCad(p.caducidad), p.codigo || '']);
      exportExcel(data, headers, 'Inventario', 'Inventario');
    }
    function exportInventarioCSV() {
      const headers = ['Producto', 'Categoría', 'Stock', 'Mínimo', 'Precio', 'Costo', 'Valor Total', 'Lote', 'Proveedor', 'Ingreso', 'Caducidad', 'Estado'];
      const data = db.productos.map(p => [p.nombre, p.categoria, p.stock, p.stockMin, p.precio, p.costo, p.stock * p.costo, p.lote, p.proveedor || '', p.ingreso, p.caducidad, estCad(p.caducidad)]);
      exportCSV(data, headers, 'Inventario');
    }

    function getKardexData() {
      return (db.kardex || []).map(k => ({ fecha: k.fecha, tipo: k.tipo, producto: k.productoNombre, cantidad: k.cantidad, referencia: k.referencia, usuario: k.usuario })).sort((a, b) => b.fecha.localeCompare(a.fecha));
    }
    function exportKardexPDF() {
      const movs = getKardexData();
      const headers = ['Fecha', 'Tipo', 'Producto', 'Cantidad', 'Referencia', 'Usuario'];
      const data = movs.map(m => [m.fecha, m.tipo, m.producto, m.tipo === 'ENTRADA' ? '+' + m.cantidad : '-' + m.cantidad, m.referencia, m.usuario]);
      exportPDF(data, headers, 'Kardex — Historial de Movimientos', 'Kardex', `Total movimientos: ${movs.length}`);
    }
    function exportKardexExcel() {
      const movs = getKardexData();
      const headers = ['Fecha', 'Tipo Movimiento', 'Producto', 'Cantidad', 'Referencia', 'Usuario'];
      const data = movs.map(m => [m.fecha, m.tipo, m.producto, m.tipo === 'ENTRADA' ? m.cantidad : -m.cantidad, m.referencia, m.usuario]);
      exportExcel(data, headers, 'Kardex', 'Kardex');
    }
    function exportKardexCSV() {
      const movs = getKardexData();
      const headers = ['Fecha', 'Tipo', 'Producto', 'Cantidad', 'Referencia', 'Usuario'];
      const data = movs.map(m => [m.fecha, m.tipo, m.producto, m.tipo === 'ENTRADA' ? m.cantidad : -m.cantidad, m.referencia, m.usuario]);
      exportCSV(data, headers, 'Kardex');
    }

    function exportComprasPDF() {
      const lista = [...db.compras].sort((a, b) => b.id - a.id);
      const tc = lista.reduce((s, c) => s + c.total, 0);
      const headers = ['Fecha', 'Producto', 'Proveedor', 'Cantidad', 'Costo Unit.', 'Total', 'Registrado por'];
      const data = lista.map(c => [c.fecha, c.producto, c.proveedor, c.cantidad, `Q${fmt(c.costo)}`, `Q${fmt(c.total)}`, c.usuario]);
      exportPDF(data, headers, 'Reporte de Compras', 'Compras', `Total órdenes: ${lista.length} · Total comprado: Q${fmt(tc)}`);
    }
    function exportComprasExcel() {
      const lista = [...db.compras].sort((a, b) => b.id - a.id);
      const headers = ['Fecha', 'Producto', 'Proveedor', 'Cantidad', 'Costo Unitario', 'Total', 'Registrado por'];
      const data = lista.map(c => [c.fecha, c.producto, c.proveedor, c.cantidad, c.costo, c.total, c.usuario]);
      exportExcel(data, headers, 'Compras', 'Compras');
    }

    // ==================== EXPORT BAR COMPONENT ====================
    function exportBar(type) {
      const configs = {
        ventas: { pdf: 'exportVentasPDF()', excel: 'exportVentasExcel()', csv: 'exportVentasCSV()', label: 'Ventas' },
        inventario: { pdf: 'exportInventarioPDF()', excel: 'exportInventarioExcel()', csv: 'exportInventarioCSV()', label: 'Inventario' },
        kardex: { pdf: 'exportKardexPDF()', excel: 'exportKardexExcel()', csv: 'exportKardexCSV()', label: 'Kardex' },
        compras: { pdf: 'exportComprasPDF()', excel: 'exportComprasExcel()', csv: '', label: 'Compras' },
      };
      const c = configs[type]; if (!c) return '';
      return `<div class="export-bar">
    <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="var(--nx1)" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
    <span class="export-bar-label">Exportar ${c.label}:</span>
    <div class="export-bar-sep"></div>
    <button class="btn btn-pdf btn-sm" onclick="${c.pdf}">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6M9 13h6M9 17h3"/></svg>
      PDF
    </button>
    <button class="btn btn-excel btn-sm" onclick="${c.excel}">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      Excel
    </button>
    ${c.csv ? `<button class="btn btn-csv btn-sm" onclick="${c.csv}">
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><path d="M14 2v6h6"/></svg>
      CSV
    </button>`: ''}
    <span style="font-size:10px;color:var(--text3);margin-left:auto">Los archivos se descargan automáticamente</span>
  </div>`;
    }

    // ==================== APP RENDER ====================
    function renderApp() {
      destCharts();
      const root = document.getElementById('root');
      if (!session) { root.innerHTML = renderLogin(); root.className = ''; return; }
      const ac = alertCount();
      root.className = 'app';
      root.innerHTML = `
  <nav class="sidebar">
    <div class="logo-area"><div class="nexus-logo-wrap">${nexusLogo(42, 26)}<div class="nexus-text-block"><span class="nexus-name">NEXUS<span class="ver-badge">PRO</span></span><span class="nexus-sub">Farmacia · Guatemala</span></div></div></div>
    <div class="user-section">
      <div class="av ${session.rol === 'administrador' ? 'av-admin' : 'av-vendor'}">${session.nombre.split(' ').map(w => w[0]).slice(0, 2).join('')}</div>
      <div class="uinfo"><div class="uname">${session.nombre.split(' ')[0]}</div><div class="urole">${session.rol}</div></div>
      <button class="btn-logout" onclick="doLogout()" title="Salir"><svg width="14" height="14" fill="none" viewBox="0 0 16 16"><path d="M6 2H3a1 1 0 00-1 1v10a1 1 0 001 1h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M11 5l3 3-3 3M14 8H6" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
    </div>

    function buildDashCharts() { const tc = darkMode ? '#9ca3af' : '#6c757d', gc = darkMode ? 'rgba(255,255,255,.04)' : 'rgba(0,0,0,.04)'; const l14 = [], d14 = []; for (let i = 13; i >= 0; i--) { const d = new Date(); d.setDate(d.getDate() - i); const ds = d.toISOString().split('T')[0]; l14.push(ds.slice(5)); d14.push(db.ventas.filter(v => v.fecha === ds).reduce((s, v) => s + v.total, 0)); } const c1 = document.getElementById('dc1'); if (c1) charts.dc1 = new Chart(c1, { type: 'bar', data: { labels: l14, datasets: [{ data: d14, backgroundColor: '#1a8db8', borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 9 }, color: tc, maxRotation: 45, autoSkip: false }, grid: { display: false } }, y: { ticks: { font: { size: 9 }, color: tc, callback: v => 'Q' + v }, grid: { color: gc } } } } }); const topP = {}; db.ventas.forEach(v => { topP[v.producto] = (topP[v.producto] || 0) + v.cantidad; }); const top5 = Object.entries(topP).sort((a, b) => b[1] - a[1]).slice(0, 5); const c2 = document.getElementById('dc2'); if (c2) charts.dc2 = new Chart(c2, { type: 'bar', data: { labels: top5.map(x => x[0].split(' ')[0]), datasets: [{ data: top5.map(x => x[1]), backgroundColor: ['#1a8db8', '#1a3a6e', '#1D9E75', '#534AB7', '#E24B4A'], borderRadius: 4 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { font: { size: 9 }, color: tc }, grid: { display: false } }, y: { ticks: { font: { size: 9 }, color: tc }, grid: { color: gc } } } } }); const metodos = { efectivo: 0, transferencia: 0, tarjeta: 0 }; db.ventas.forEach(v => { if (metodos[v.metodoPago] !== undefined) metodos[v.metodoPago]++; }); const c3 = document.getElementById('dc3'); if (c3) charts.dc3 = new Chart(c3, { type: 'doughnut', data: { labels: ['Efectivo', 'Transferencia', 'Tarjeta'], datasets: [{ data: Object.values(metodos), backgroundColor: ['#1a8db8'     function iaAnalyze(q) {
      const ql = q.toLowerCase(); const tv = db.ventas.reduce((s, v) => s + v.total, 0); const gan = db.ventas.reduce((s, v) => { const p = db.productos.find(x => x.id === v.productoId); return s + (p ? (v.precio - p.costo) * v.cantidad : 0); }, 0); const sb = db.productos.filter(p => p.stock <= p.stockMin); const cad30 = db.productos.filter(p => dias(p.caducidad) <= 30 && dias(p.caducidad) > 0); const topP = {}; db.ventas.forEach(v => { topP[v.producto] = (topP[v.producto] || 0) + v.cantidad; }); const top3 = Object.entries(topP).sort((a, b) => b[1] - a[1]).slice(0, 3);

der"><span class="card-title" style="color:var(--amberd)">Stock bajo</span></div>${sb.length === 0 ? '<div class="empty-state">Todo OK</div>' : `<table><thead><tr><th>Producto</th><th>Actual</th><th>Mínimo</th><th>Proveedor</th></tr></thead><tbody>${sb.map(p => `<tr><td style="font-weight:500">${p.nombre}</td><td><span class="badge br">${p.stock}</span></td><td>${p.stockMin}</td><td style="font-size:11px">${p.proveedor || '—'}</td></tr>`).join('')}</tbody></table>`}</div></div>`; }

    function exportTicketPDF(vid) { const v = db.ventas.find(x => x.id === vid); if (!v || !window.jspdf) return; const { jsPDF } = window.jspdf; const doc = new jsPDF({ unit: 'mm', format: [80, 120] }); doc.setFillColor(26, 141, 184); doc.rect(0, 0, 80, 16, 'F'); doc.setTextColor(255, 255, 255); doc.setFontSize(9); doc.setFont('helvetica', 'bold'); doc.text('NEXUS FARMACIA', 40, 8, { align: 'center' }); doc.setFontSize(7); doc.setFont('helvetica', 'normal'); doc.text('Factura Electrónica FEL · GT', 40, 13, { align: 'center' }); doc.setTextColor(0, 0, 0); doc.setFontSize(7); let y = 22; const line = (l, r) => { doc.text(l, 4, y); if (r) doc.text(r, 76, y, { align: 'right' }); y += 5; }; line(`FEL-${String(v.id).padStart(6, '0')}`, v.fecha); line(`NIT: ${v.nit || 'CF'}`, `Cliente: ${v.cliente}`); doc.setDrawColor(200); doc.line(4, y - 2, 76, y - 2); y += 2; line(v.producto); line(`${v.cantidad} x Q${fmt(v.precio)}`, `Q${fmt(v.cantidad * v.precio)}`); if (v.descuento) line(`Dto ${v.descuento}%`, `-Q${fmt(v.cantidad * v.precio * v.descuento / 100)}`); doc.line(4, y - 2, 76, y - 2); y += 2; doc.setFont('helvetica', 'bold'); doc.setFontSize(9); line('TOTAL', `Q${fmt(v.total)}`); doc.setFont('helvetica', 'normal'); doc.setFontSize(7); line(`Pago: ${v.metodoPago || 'efectivo'}`, `Cajero: ${v.usuario}`); doc.line(4, y - 2, 76, y - 2); y += 3; doc.setFontSize(6); doc.setTextColor(120); doc.text('Gracias por su compra · www.nexusfarmacia.gt', 40, y, { align: 'center' }); doc.save(`NEXUS_Ticket_${String(v.id).padStart(4, '0')}.pdf`); showToast('Ticket PDF descargado'); }

    async function toggleUser(id, v) { try { await APIService.toggleUsuario(id); await loadAll(); showToast(v ? 'Usuario activado' : 'Usuario desactivado'); } catch (e) { showToast('Error al actualizar usuario', 'error'); } }
    async function delUser(id) { if (!confirm('¿Eliminar usuario?')) return; try { await APIService.deleteUsuario(id); await loadAll(); rc(); showToast('Usuario eliminado', 'warn'); } catch (e) { showToast('Error al eliminar usuario', 'error'); } }
    function showPerms(usr) { const u = users.find(x => x.usuario === usr); if (!u) return; const p = PERMS[u.rol]; showModal(`<div class="modal"><h3>Permisos — ${u.nombre}</h3><div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;padding:10px;background:var(--bg3);border-radius:var(--radius-sm)"><div class="av ${u.rol === 'administrador' ? 'av-admin' : 'av-vendor'}">${u.nombre.split(' ').map(w => w[0]).slice(0, 2).join('')}</div><div><div style="font-weight:600;font-size:13px">${u.nombre}</div><div style="font-size:11px;color:var(--text2)">${u.usuario} · <span class="badge ${u.rol === 'administrador' ? 'bp' : 'bg'}">${u.rol}</span></div></div></div><table class="perm-table"><thead><tr><th style="text-align:left">Módulo</th><th>Lectura</th><th>Escritura</th><th>Eliminar</th></tr></thead><tbody>${Object.entries(p).map(([k, v]) => `<tr><td style="font-size:12px;text-transform:capitalize;text-align:left">${k}</td><td>${v.r ? '<span class="badge bg">✓</span>' : '<span class="badge br">✗</span>'}</td><td>${v.w ? '<span class="badge bg">✓</span>' : '<span class="badge br">✗</span>'}</td><td>${v.d ? '<span class="badge bg">✓</span>' : '<span class="badge br">✗</span>'}</td></tr>`).join('')}</tbody></table><div class="modal-actions"><button class="btn" onclick="closeModal()">Cerrar</button></div></div>`); }

    loadAll();
  </script>
</body>

</html>
